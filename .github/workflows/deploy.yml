name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      
      - name: Verify LFS files
        run: |
          echo "Checking Git LFS files:"
          git lfs ls-files
          echo "Checking if video file exists:"
          ls -lh public/assets/ || echo "Directory not found"
          if [ -f "public/assets/AI Agent Specialist.mp4" ]; then
            echo "✓ Video file found and size:"
            ls -lh "public/assets/AI Agent Specialist.mp4"
          else
            echo "✗ Video file NOT found!"
          fi
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build
        run: npm run build
      
      - name: Verify build output
        run: |
          echo "Checking dist folder:"
          ls -lh dist/ || echo "dist folder not found"
          if [ -d "dist/assets" ]; then
            echo "Checking dist/assets:"
            ls -lh dist/assets/ || echo "assets folder empty"
            if [ -f "dist/assets/AI Agent Specialist.mp4" ]; then
              echo "✓ Video file in dist/assets/"
              ls -lh "dist/assets/AI Agent Specialist.mp4"
            else
              echo "✗ Video file NOT in dist/assets/"
            fi
          fi
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

