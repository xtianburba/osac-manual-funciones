
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSAC - Manual de Funciones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .slide-enter { transform: translateX(100%); opacity: 0; }
        .slide-enter-active { transform: translateX(0); opacity: 1; transition: all 0.5s ease-out; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @media print {
            header, footer, .no-print, button {
                display: none !important;
            }
            main {
                padding: 0 !important;
                margin: 0 !important;
                height: auto !important;
                overflow: visible !important;
                display: block !important;
            }
            body {
                background: white !important;
                overflow: visible !important;
                height: auto !important;
            }
            .max-w-7xl {
                max-width: 100% !important;
                width: 100% !important;
            }
            .page-break {
                page-break-after: always !important;
                break-after: page !important;
                display: block;
            }
            /* Asegurar que los colores y sombras se impriman */
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            /* Evitar que los grids se corten mal */
            .grid {
                display: block !important;
            }
            .grid > div {
                margin-bottom: 2rem;
                page-break-inside: avoid;
            }
        }
    </style>
