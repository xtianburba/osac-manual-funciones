
# Recomendación de configuración para Nginx en Ubuntu VPS
# Ubicación típica: /etc/nginx/sites-available/osac-manual

server {
    listen 80;
    server_name manual-osac.tuempresa.com; # Cambiar por tu dominio

    root /var/www/osac-manual/dist; # Ruta donde se haga el 'npm run build'
    index index.html;

    # Soporte para Single Page Application (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caché para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Seguridad básica
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    access_log /var/log/nginx/osac_access.log;
    error_log /var/log/nginx/osac_error.log;
}

# Pasos para desplegar:
# 1. Ejecutar 'npm run build' localmente o en el servidor.
# 2. Copiar la carpeta 'dist/' a '/var/www/osac-manual/dist'.
# 3. Crear este archivo en sites-available y enlazarlo a sites-enabled.
# 4. 'sudo nginx -t' para verificar sintaxis.
# 5. 'sudo systemctl reload nginx'.
